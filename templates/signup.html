<!DOCTYPE html>
<html>
<head>
    <title>Signup - TRACERS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h2>Create Your Account</h2>

    <form action="/login_id" method="POST">

        <input type="text" name="name" placeholder="Enter Name" required><br>

        <input type="email" name="email" placeholder="Enter Email" required><br>

        <input type="text" name="userid" placeholder="Create User ID" required><br>

        <input type="password" name="password" placeholder="Create Password" required><br>

        <button type="submit">Signup</button>

    </form>

</div>

<!-- CHATBOT OUTSIDE CONTAINER -->
<div class="chatbot-bar" id="chatbar">
    <iframe src="https://cdn.botpress.cloud/webchat/v3.6/shareable.html?configUrl=https://files.bpcontent.cloud/2026/02/27/07/20260227072711-WIJSEI8B.json"></iframe>
</div>

<button class="chat-toggle" onclick="toggleChat()">💬</button>

<script>
function toggleChat(){
let chat = document.getElementById("chatbar");
chat.style.display = chat.style.display === "none" ? "flex" : "none";
}
</script>

</body>
</html>
